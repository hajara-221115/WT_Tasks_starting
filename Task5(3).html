<!DOCTYPE html>
<html>
<head>
    <title>Inline Style Change</title>
</head>
<body>

    <h2 id="text" style="color: black; font-size: 20px; background-color: lightgray; padding: 10px;">
        This text will change style!
    </h2>

    <button onclick="changeAppearance()">Change Appearance</button>

    <script>
        function changeAppearance() {
            var element = document.getElementById("text");

            // Modify inline styles dynamically
            element.style.color = "white";          // change text color
            element.style.fontSize = "30px";        // change font size
            element.style.backgroundColor = "blue"; // change background
            element.style.padding = "20px";         // adjust padding
            element.style.borderRadius = "10px";    // add rounded corners
        }
    </script>

</body>
</html>
