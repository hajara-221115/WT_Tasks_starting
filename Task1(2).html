<!DOCTYPE html>
<html>
<head>
    <title>Console Log Example</title>
</head>
<body>

    <h2>Open the Console to See the Output</h2>

    <script>
        // Assign values to variables
        var name = "Hajara";
        let age = 20;
        const country = "India";

        // Display the values using console.log()
        console.log("Name:", name);
        console.log("Age:", age);
        console.log("Country:", country);
    </script>

</body>
</html>
